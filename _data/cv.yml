cv:
  name: R. D. S. Yadava
  label: Independent researcher · Condensed matter physics & sensor systems
  email: ardius@gmail.com
  summary: >
    Independent researcher whose work bridges condensed matter physics and
    sensor systems, with a consistent emphasis on connecting physical theory to
    device behaviour. Contributions span fractal models of 1/f noise, dielectric
    breakdown statistics in MOS devices, electrostatic theory of disordered
    metallic films, charge transport and intrinsic-carrier physics in
    HgCdTe/CdTe infrared materials, the design and architecture of SAW and
    MEMS/NEMS chemical and biological sensors, electronic-nose data analytics,
    and nonlinear-dynamics-based sensing — including stochastic-resonance and
    synchronization-coupled oscillator architectures. Recent work extends these
    themes to active soft matter, where elastohydrodynamic interactions and
    parametric excitation enable propulsion and navigation of artificial
    microswimmers. A unifying thread is the constructive role of disorder,
    nonlinearity, and coupling — through mechanisms such as fractal geometry,
    stochastic resonance, synchronization, and parametric excitation — in
    extending sensor performance beyond conventional limits. Previously
    Professor of Physics at Banaras Hindu University, Varanasi, and R&D
    Scientist at the Solid State Physics Laboratory (DRDO), Delhi, India.

  sections:
    Experience:
      - company: Independent researcher
        position: Research, teaching, and scholarly writing
        location: India
        summary: >
          Continued research, teaching engagements, and scholarly writing
          across condensed matter physics and sensor systems.

      - company: Banaras Hindu University
        position: Professor of Physics
        location: Varanasi, India
        summary: >
          Led research and teaching in condensed matter physics, sensor
          systems, MEMS/NEMS dynamics, electronic-nose data analytics, and
          nonlinear-dynamics-based sensor architectures. Principal investigator
          on sponsored projects in molecular recognition for polymeric sensor
          platforms (DRDO) and electronic-nose technology development (DST).

      - company: Solid State Physics Laboratory (DRDO)
        position: R&D Scientist
        location: Delhi, India
        summary: >
          Research and development on HgCdTe/CdTe materials for infrared
          detectors, surface-acoustic-wave (SAW) devices and chemical sensors
          for chemical-warfare-agent and explosives detection, radar signal
          processing, and SAW-based biosensors. Coordinator of multiple
          long-running technology programmes including the SAW Devices and
          Subsystems programme, the SAW Biosensor Development project, and the
          Indo-Russia ILTP advanced-SAW programme.

