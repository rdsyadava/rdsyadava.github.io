cv:
  name: R. D. S. Yadava
  label: Independent researcher · Condensed matter physics & sensor systems
  email: ardius@gmail.com
  summary: >
    Independent researcher whose work spans disordered systems, semiconductor
    materials, microsensors, and intelligent sensing architectures, with a
    consistent emphasis on connecting physical theory to device behavior.
    Contributions include the physics and design of SAW and MEMS/NEMS sensors,
    electronic-nose systems, sensor signal processing, fractal models of 1/f
    noise and dielectric breakdown, nonlinear-dynamics-based sensor
    architectures, and elastohydrodynamic models of microswimmer propulsion.

  sections:
    Experience:
      - company: Independent researcher
        position: Research, teaching, and scholarly writing
        location: India
        summary: >
          Continued research, teaching engagements, and scholarly writing
          across condensed matter physics and sensor systems.

      - company: Banaras Hindu University
        position: Professor of Physics
        location: Varanasi, India
        summary: >
          Led research and teaching in condensed matter physics, sensor
          systems, electronic-nose data analytics, MEMS/NEMS dynamics, and
          nonlinear-dynamics-based sensor architectures.

      - company: Solid State Physics Laboratory (DRDO)
        position: R&D Scientist
        location: Delhi, India
        summary: >
          Research and development on HgCdTe/CdTe materials for infrared
          detectors, surface-acoustic-wave (SAW) devices and chemical sensors,
          radar signal processing, and sensor technology programs.

    Research interests:
      - name: Condensed matter
        icon: fa-solid fa-hashtag
        keywords: "Disordered systems, fractals, percolation, 1/f noise, variable-range hopping, dielectric breakdown"
      - name: Sensor systems
        icon: fa-solid fa-hashtag
        keywords: "SAW sensors, MEMS/NEMS biosensors, electronic noses, sensor signal processing, pattern recognition"
      - name: Nonlinear dynamics
        icon: fa-solid fa-hashtag
        keywords: "Stochastic resonance, synchronization, parametric excitation, chaotic Colpitts oscillators, Van der Pol systems"
      - name: Soft matter
        icon: fa-solid fa-hashtag
        keywords: "Microswimmers, elastohydrodynamics, dynamic symmetry breaking"
      - name: Semiconductor materials & devices
        icon: fa-solid fa-hashtag
        keywords: "HgCdTe, CdTe, IR detectors, MOS device physics, ion-implantation effects"
